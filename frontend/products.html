<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background: #3498db;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .low {
            color: red;
            font-weight: bold;
        }

        .back-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 15px;
    background: #2c3e50;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.back-btn:hover {
    background: #34495e;
}

    </style>
</head>

<body>

<button class="back-btn" onclick="goHome()">⬅ Back</button>

<h2>📦 Product Inventory</h2>

<table>
    <thead>
        <tr>
            <th>Product ID</th>
            <th>Name</th>
            <th>Stock</th>
            <th>Reorder Level</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
fetch("http://localhost:5000/products")
.then(res => res.json())
.then(data => {
    let tbody = document.getElementById("tableBody");

    data.forEach(p => {

        // Highlight low stock
        let stockClass = p.stock < p.reorder_level ? "low" : "";

        let row = `
            <tr>
                <td>${p.product_id}</td>
                <td>${p.product_name}</td>
                <td class="${stockClass}">${p.stock}</td>
                <td>${p.reorder_level}</td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
})
.catch(err => {
    console.error("Error loading products:", err);
});

function goHome() {
    window.location.href = "index.html";
}

</script>

</body>
</html>
